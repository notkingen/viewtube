<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ViewTube</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-left">
    <button class="menu-btn" id="menuBtn">
      <span></span><span></span><span></span>
    </button>
    <a href="#" class="logo">
      <svg viewBox="0 0 90 20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="28" height="20" rx="4" fill="#FF2D2D"/>
        <polygon points="11,6 11,14 19,10" fill="white"/>
        <text x="33" y="15" font-family="Bebas Neue,sans-serif" font-size="17" fill="currentColor" letter-spacing="1">ViewTube</text>
      </svg>
    </a>
  </div>
  <div class="search-bar">
    <input type="text" placeholder="Search" id="searchInput" />
    <button class="search-btn" id="searchBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/></svg>
    </button>
  </div>
  <div class="header-right">
    <button class="icon-btn" title="Upload">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><polyline points="8 21 12 17 16 21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
    </button>
    <button class="icon-btn" title="Notifications">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      <span class="badge">3</span>
    </button>
    <div class="avatar">VT</div>
  </div>
</header>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
  <nav class="sidebar-nav">
    <a href="#" class="nav-item active" data-filter="all">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      Home
    </a>
    <a href="#" class="nav-item" data-filter="trending">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
      Trending
    </a>
    <a href="#" class="nav-item" data-filter="subscriptions">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      Subscriptions
    </a>
    <div class="nav-divider"></div>
    <a href="#" class="nav-item" data-filter="library">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      Library
    </a>
    <a href="#" class="nav-item" data-filter="history">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.95"/></svg>
      History
    </a>
    <div class="nav-divider"></div>
    <p class="nav-label">EXPLORE</p>
    <a href="#" class="nav-item" data-filter="music">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
      Music
    </a>
    <a href="#" class="nav-item" data-filter="gaming">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="6" y1="12" x2="10" y2="12"/><line x1="8" y1="10" x2="8" y2="14"/><line x1="15" y1="13" x2="15.01" y2="13"/><line x1="18" y1="11" x2="18.01" y2="11"/><rect x="2" y="6" width="20" height="12" rx="2"/></svg>
      Gaming
    </a>
    <a href="#" class="nav-item" data-filter="news">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 0-2 2zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"/><path d="M18 14h-8"/><path d="M15 18h-5"/><path d="M10 6h8v4h-8V6z"/></svg>
      News
    </a>
  </nav>
</aside>

<!-- MAIN -->
<main class="main" id="main">

  <!-- CHIPS -->
  <div class="chips-bar" id="chipsBar">
    <button class="chip active" data-cat="all">All</button>
    <button class="chip" data-cat="music">Music</button>
    <button class="chip" data-cat="gaming">Gaming</button>
    <button class="chip" data-cat="tech">Tech</button>
    <button class="chip" data-cat="news">News</button>
    <button class="chip" data-cat="cooking">Cooking</button>
    <button class="chip" data-cat="sports">Sports</button>
    <button class="chip" data-cat="comedy">Comedy</button>
    <button class="chip" data-cat="education">Education</button>
    <button class="chip" data-cat="travel">Travel</button>
  </div>

  <!-- VIDEO GRID -->
  <div class="video-grid" id="videoGrid"></div>
</main>

<!-- VIDEO MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <button class="modal-close" id="modalClose">✕</button>
    <div class="modal-content">
      <div class="video-player" id="videoPlayer">
        <div class="player-placeholder">
          <div class="play-icon-big">▶</div>
        </div>
        <div class="player-controls">
          <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
          <div class="controls-row">
            <button class="ctrl-btn" id="playPauseBtn">▶</button>
            <span class="time-display">0:00 / 12:34</span>
            <div style="flex:1"></div>
            <button class="ctrl-btn">⚙</button>
            <button class="ctrl-btn" id="fullscreenBtn">⛶</button>
          </div>
        </div>
      </div>
      <div class="modal-info">
        <h2 class="modal-title" id="modalTitle"></h2>
        <div class="modal-meta">
          <div class="modal-channel-row">
            <div class="channel-avatar-big" id="modalChannelAvatar"></div>
            <div>
              <p class="modal-channel" id="modalChannel"></p>
              <p class="modal-subs" id="modalSubs"></p>
            </div>
            <button class="subscribe-btn">Subscribe</button>
          </div>
          <div class="modal-stats">
            <span id="modalViews"></span>
            <span id="modalDate"></span>
          </div>
          <div class="modal-actions">
            <button class="action-btn like-btn" id="likeBtn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3H14z"/><path d="M7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/></svg>
              <span id="likeCount"></span>
            </button>
            <button class="action-btn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3H10z"/><path d="M17 2h2.67A2.31 2.31 0 0 1 22 4v7a2.31 2.31 0 0 1-2.33 2H17"/></svg>
              Dislike
            </button>
            <button class="action-btn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
              Share
            </button>
            <button class="action-btn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
              More
            </button>
          </div>
        </div>
        <div class="modal-description" id="modalDesc"></div>
      </div>
    </div>

    <!-- COMMENTS -->
    <div class="comments-section">
      <h3>Comments <span id="commentCount"></span></h3>
      <div class="comment-input-row">
        <div class="avatar small">VT</div>
        <input type="text" class="comment-input" placeholder="Add a comment..." id="commentInput"/>
        <button class="comment-submit" id="commentSubmit">Post</button>
      </div>
      <div class="comments-list" id="commentsList"></div>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
